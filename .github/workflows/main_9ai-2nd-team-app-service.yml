name: Build and deploy Python app to Azure Web App - 9ai-2nd-team-app-service

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**' # backend 폴더 변경시에만 작동하도록 최적화
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python version
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 1. 패키지 설치 단계 (working-directory 추가)
      - name: Create and Start virtual environment and Install dependencies
        working-directory: backend  # <--- backend 폴더 안에서 실행
        run: |
          python -m venv antenv
          source antenv/bin/activate
          pip install -r requirements.txt

      # 2. 빌드 아티팩트 업로드 (path 수정)
      - name: Upload artifact for deployment jobs
        uses: actions/upload-artifact@v4
        with:
          name: python-app
          path: |
            backend/
            !backend/antenv/

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: python-app
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_66AF6112E77C47E89CE0C6B25C793F2E }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_1887BF60BD1C4A28AADD1863D1B35279 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_C228FFB582194E21B0A3FFAEE07952C2 }}

      - name: 'Deploy to Azure Web App'
        uses: azure/webapps-deploy@v3
        with:
          app-name: '9ai-2nd-team-app-service'
          package: .
