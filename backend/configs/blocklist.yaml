# ============================================================
# REGEX 매칭 — 동적 패턴 (신규 v2)
# ============================================================
regex_patterns:

  hard_block:

    발모성장:
      - pattern: '(모발|속눈썹|눈썹)\s*(이|가)?\s*(자란|자라|성장|길어|새로\s*나)'
        category: "발모성장"
        legal_basis:
          - "화장품법 제13조 제1항 제1호"
          - "KCIA 자문기준 § 세부기준 (2)"
        reason: "모발·속눈썹 자람 표현은 발모제·의약외품 효능"
        example: "속눈썹이 자란다"

    체중감량수치:
      - pattern: '(\d+)\s*(kg|킬로|파운드)\s*(감량|빠지|손실)'
        category: "다이어트표방"
        legal_basis:
          - "화장품법 제13조 제1항 제1호"
        reason: "수치 체중 감량 표현은 다이어트 의약품 오인"
        example: "3kg 감량"

  caution:

    시점단정:
      - pattern: '(\d+)\s*(일|주|개월|시간)\s*(만에|후|이내|안에|지나|경과)'
        category: "시점단정"
        legal_basis:
          - "화장품법 제14조 (표시·광고 내용의 실증 등)"
          - "식약처 실증 가이드라인 [별표2]"
        reason: "구체적 시점 주장은 인체적용시험 실증 자료 필수"
        example: "14일 만에, 2주 후, 1개월 이내"

    수치주장:
      - pattern: '(\d+)\s*(%|퍼센트)\s*(만족|개선|입증|효과|감소|증가|향상)'
        category: "수치주장"
        legal_basis:
          - "화장품법 제14조"
          - "식약처 실증 가이드라인"
        reason: "수치 효능 주장은 실증 자료 필수 (실증 없으면 거짓 광고)"
        example: "87% 개선, 98% 만족"

    배수표현:
      - pattern: '(\d+)\s*(배|x|X)\s*(더|좋|효과|개선)'
        category: "수치주장"
        legal_basis:
          - "화장품법 제14조"
        reason: "배수 표현은 비교 대상·근거 명시와 실증 필수"
        example: "5배 더 효과"


# ============================================================
# 부정 맥락 감지 (신규 v2)
# ============================================================
# 매칭된 키워드 주변 window 내에 부정 표현이 있으면 심각도 다운그레이드
negation:
  window: 15  # 앞뒤 15글자
  patterns:
    - '없(는|이|고|어|다|습니다|을)'
    - '아닌'
    - '아닙니다'
    - '못하(는|고|며)'
    - '제외'
    - '않(는|고|고서|는다|습니다|음)'
    - '안\s*(써|넣|들)'
  downgrade_effect: "one_level"
  # hard_block → caution → pass → pass


# ============================================================
# 긍정 플래그 — 기능성 보고 완료 등 (신규 v2)
# ============================================================
positive_flags:

  functional_approved:
    patterns:
      - '기능성화장품.*(보고|심사).*(완료|통과)'
      - '기능성\s*화장품\s*(보고|신고|등록)'
      - '식약처.*(인증|등록|심사).*(완료|통과)'
    effect: "functional_approved"
    description: "기능성화장품 심사 완료 → functional_conditional 매칭은 safe로 처리"

  evidence_cited:
    patterns:
      - '인체\s*적용\s*시험.*(완료|결과)'
      - '임상\s*시험.*(완료|결과)'
      - '시험\s*기관.*입증'
      - '자사\s*설문\s*\(?n\s*=\s*\d+\)?'
    effect: "evidence_downgrade"
    description: "실증 자료 언급 시 수치·시점 주장 caution → safe 고려"


