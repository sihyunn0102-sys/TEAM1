# AdGuard Rule Engine 블록리스트 v3 (D12 리팩터)
# 근거: KCIA 해설서 2023 + 식약처 지침 + 2025 정책 강화
#
# v3 (D12) 변경점 — L1을 바이너리 필터로 축소:
#   - substring_patterns / regex_patterns 모두 hard_block 섹션만 유지
#   - caution / functional_conditional 섹션 제거 → L3 grounded.txt로 이전
#   - negation / positive_flags 제거 → L3가 맥락 판단 (grounded.txt D12+ 지침)
#   - L1은 "확정 위반 키워드만 즉시 차단"하는 순수 필터로 복귀

version: "3.0"
updated: "2026-04-21"
sources:
  - KCIA_화장품광고자문기준해설서_2023
  - 식약처_화장품표시광고관리지침_20250814
  - 식약처_2025_정책강화 (마이크로니들·엑소좀·이너케어 금지)
  - 식약처_화장품부당광고적발사례_20250807

# ============================================================
# SUBSTRING 매칭 — 명확한 키워드
# ============================================================
substring_patterns:

  hard_block:

    시술용어:
      legal_basis:
        - "화장품법 제13조 제1항 제1호"
        - "KCIA 자문기준 해설서 2023 § 세부기준 (1)-①"
      reason: "시술·의약품 효능 표방으로 의약품 오인 광고에 해당"
      keywords:
        - 바르는 보톡스
        - 보톡스 효과
        - 보톡스 크림
        - 바르는 필러
        - 필러 효과
        - 바르는 레이저
        - 레이저 효과
        - 카복시 효과
        - 스킨부스터 효과

    마이크로니들:
      legal_basis:
        - "식약처 화장품 표시·광고 관리지침 (2025 개정)"
        - "화장품법 제2조 (화장품 정의 — 외부 적용)"
      reason: "침습적 전달·진피층 침투는 화장품 범위를 벗어남 (2025 신규 금지)"
      keywords:
        - 마이크로니들
        - MTS
        - Microneedle
        - PDRN 주사
        - 진피층 침투

    질병치료:
      legal_basis:
        - "화장품법 제13조 제1항 제1호"
        - "KCIA 자문기준 § 세부기준 (1)-②"
      reason: "질병 치료·예방은 의약품 효능·효과로 화장품 범위 초과"
      keywords:
        - 아토피 치료
        - 아토피 개선
        - 아토피 예방
        - 여드름 치료
        - 여드름 치유
        - 여드름 제거
        - 건선 치료
        - 건선 개선
        - 항암
        - 피부암 치료
        - 항염
        - 이뇨 작용
        - 진통
        - 통증 경감
        - 통증 완화
        - 찰과상 치료
        - 화상 치료
        - 모낭충 제거
        - 기저귀 발진 제거

    세포재생:
      legal_basis:
        - "화장품법 제13조 제1항 제1호"
        - "KCIA 자문기준 § 세부기준 (2)"
      reason: "세포·DNA·유전자 활성화는 약리학적 효능 영역"
      keywords:
        - 세포 재생
        - 세포 활성
        - DNA 활성
        - 유전자 활성
        - 세포 증식

    다이어트표방:
      legal_basis:
        - "화장품법 제13조 제1항 제1호"
        - "식약처 2024-12 지방분해 광고 124건 적발 보도자료"
      reason: "지방 분해·체중 감량은 의약품 효능이며 화장품 범위 초과"
      keywords:
        - 지방 분해
        - 지방 연소
        - 체지방 감소
        - 체중 감량
        - 다이어트 효과
        - 살 빼는
        - 셀룰라이트 제거
        - 바디 슬리밍
        - 복부 다이어트

    신체변형:
      legal_basis:
        - "화장품법 제13조 제1항 제1호"
      reason: "신체 형태 변형은 화장품 효능·효과 벗어남"
      keywords:
        - V라인 만들
        - 얼굴 작아
        - 가슴 확대
        - 몸매 개선

    생리활성:
      legal_basis:
        - "화장품법 제13조 제1항 제1호"
      reason: "호르몬·면역·혈액순환 등 생리 활성은 의약품 영역"
      keywords:
        - 호르몬 분비
        - 내분비
        - 혈액순환 촉진
        - 땀 발생 억제
        - 면역 강화
        - 항진균
        - 항바이러스
        - 항알레르기

    살균소독:
      legal_basis:
        - "화장품법 제13조 제1항 제1호"
      reason: "살균·소독은 의약외품·의약품 범주 (인체 세정용 '항균' 제외)"
      keywords:
        - 살균 효과
        - 소독 효과

    해독:
      legal_basis:
        - "화장품법 제13조 제1항 제1호"
      reason: "해독·디톡스는 약리학적 효능 암시"
      keywords:
        - 해독 작용
        - 디톡스
        - detox
        - 체내 노폐물 제거
        - 피부 독소 제거

    의약품오인:
      legal_basis:
        - "화장품법 제13조 제1항 제1호"
        - "KCIA 자문기준 § 세부기준 (2) 기타"
      reason: "의약품 관련 용어를 제품명·설명에 사용하는 것은 오인 광고"
      keywords:
        - 메디슨
        - medicine 화장
        - 드럭 화장
        - 드럭스토어 화장
        - 코스메슈티컬
        - 의약품급
        - 피부과 처방

    성관련:
      legal_basis:
        - "화장품법 제2조 (적용 부위)"
        - "KCIA 자문기준 § 세부기준 (4)-①"
      reason: "성기능·질 내부 작용은 화장품 적용 부위·범위 초과"
      keywords:
        - 여성크림
        - 성 윤활
        - 질 수축
        - 쾌감 증대

    발모:
      legal_basis:
        - "화장품법 제13조 제1항 제1호"
      reason: "발모·육모는 의약품(탈모 치료제) 효능"
      keywords:
        - 발모 효과
        - 육모 효과
        - 양모 효과

    탈모의약품:
      legal_basis:
        - "화장품법 제13조 제1항 제1호"
        - "KCIA 자문기준 § 기능성화장품 바"
      reason: "탈모 '방지·예방·치료'는 의약품 영역. '완화'만 기능성 허용"
      keywords:
        - 탈모 방지
        - 탈모 예방
        - 탈모 치료
        - 탈모 치유

    안전성단정:
      legal_basis:
        - "KCIA 자문기준 § 세부기준 (4)-③"
      reason: "개인차 부정 및 100% 안전 단정은 소비자 기만"
      keywords:
        - 부작용이 전혀 없
        - 부작용 제로
        - 100% 안전
        - 먹을 수 있는 화장품

  # ============================================================
  # D12 제거: caution / functional_conditional 섹션 전체
  # → L3 grounded.txt로 이전 (일반 조항 해석 원칙 + 기능성 10종 섹션)
  # L1은 확정 위반만 차단하는 바이너리 필터로 축소됨
  # ============================================================


# ============================================================
# REGEX 매칭 — 동적 패턴 (신규 v2)
# ============================================================
regex_patterns:

  hard_block:

    발모성장:
      - pattern: '(모발|속눈썹|눈썹)\s*(이|가)?\s*(자란|자라|성장|길어|새로\s*나)'
        category: "발모성장"
        legal_basis:
          - "화장품법 제13조 제1항 제1호"
          - "KCIA 자문기준 § 세부기준 (2)"
        reason: "모발·속눈썹 자람 표현은 발모제·의약외품 효능"
        example: "속눈썹이 자란다"

    체중감량수치:
      - pattern: '(\d+)\s*(kg|킬로|파운드)\s*(감량|빠지|손실)'
        category: "다이어트표방"
        legal_basis:
          - "화장품법 제13조 제1항 제1호"
        reason: "수치 체중 감량 표현은 다이어트 의약품 오인"
        example: "3kg 감량"

  # ============================================================
  # D12 제거: regex_patterns.caution 전체 (시점단정·수치주장·배수표현)
  # → L3 grounded.txt의 "수치 주장 판정 세부 규칙"·"실증 자료 인식"으로 이전
  # ============================================================


# ============================================================
# D12 제거된 섹션:
#   - negation (부정 맥락 감지) → grounded.txt "부정 맥락 인식" 지침
#   - positive_flags (functional_approved / evidence_cited)
#     → grounded.txt "기능성 승인 인식" / "실증 자료 인식" 지침
# ============================================================


# ============================================================
# 참고 — 안전 표현 힌트 (매칭 아님)
# ============================================================
safe_hints:
  감각: [촉촉, 매끈, 산뜻, 부드러, 쫀쫀, 탱탱]
  상태: [건강한, 생기, 윤기, 투명]
  철학: [있는 그대로, 나를 사랑, 웰빙, 라이프스타일]
